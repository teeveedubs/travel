<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>Travel Itineraries</title>
<style>
  :root {
    --bg: #f7f6f3;
    --text: #1c1c1e;
    --text2: #6e6e73;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --text: #f2f2f7;
      --text2: #98989e;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    text-align: center;
  }
  .icon {
    font-size: 44px;
    margin-bottom: 18px;
    opacity: 0.55;
    line-height: 1;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 14px 0;
    letter-spacing: -0.01em;
  }
  p {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text2);
    margin: 0 0 6px 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">✈︎</div>
      <h1>Travel Itineraries</h1>
      <p>Nothing to see here.</p>
      <p>Trip URLs are shared individually.</p>
    </div>
  </div>
</body>
</html>
